<div class="login-page">

<div class="logo-circle">

  <img
    src="tt logo.png"
    class="logo-img"
    alt="logo"
  />

</div>

  <h1>Task Tutorials</h1>

  <p class="subtitle">
    Master your momentum.
  </p>

  <div class="login-card">

    <label>Email or Username</label>

    <input
      type="email"
      placeholder="Enter your email"
      [(ngModel)]="email"
      required
      (keyup.enter)="login()"
    />

    <label>Password</label>

    <div class="password-field">

      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="••••••••••"
        [(ngModel)]="password"
        required
        (keyup.enter)="login()"
      />

      <span
        class="eye-icon"
        (click)="togglePassword()"
      >
        👁️
      </span>

    </div>

    <p class="forgot-password">
      Forgot Password?
    </p>

    <button
      class="signin-btn"
      (click)="login()"
    >
      Sign In
    </button>

  
    <div class="social-buttons">

      <button
        class="google-btn"
        (click)="googleLogin()"
      >

        <img
          src="https://cdn-icons-png.flaticon.com/512/281/281764.png"
          alt="google"
        />

        Continue with Google

      </button>

    </div>

  </div>

  <p class="signup-text">

    Don’t have an account?

    <span routerLink="/signup">
      Sign Up
    </span>

  </p>

</div>
