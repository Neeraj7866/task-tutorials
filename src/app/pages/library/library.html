<div class="library-page">

  <!-- TOP NAVBAR -->

  <div class="top-navbar">

    <i class="fa-solid fa-bars"></i>

    <h2>TASK TUTORIALS</h2>

    <i
      class="fa-solid fa-magnifying-glass search-btn"
      (click)="toggleSearch()"
    ></i>

  </div>

  <!-- SEARCH -->

  <input
    *ngIf="showSearch"
    type="text"
    placeholder="Search notes..."
    [(ngModel)]="searchText"
    class="search-input"
  >

  <!-- HEADER -->

  <div class="top-header">

    <div class="header-content">

      <h1>Smart E-notes</h1>

      <p>Access your comprehensive study material</p>

    </div>

  </div>

  <!-- DROPDOWN -->

  <div class="dropdown-section">

    <select>

      <option>IXth PCMB</option>

      <option>Xth PCMB</option>

    </select>

  </div>

  <!-- NOTES GRID -->

  <div class="notes-grid">

    <div
      class="note-card"
      routerLink="/library-details/expansions"
    >

      <div class="folder-icon">
        <i class="fa-regular fa-folder"></i>
      </div>

      <h3>Expansions</h3>

      <p>12 Notes</p>

      <span>2 days ago</span>

    </div>

    <div
      class="note-card"
      routerLink="/library-details/rational-numbers"
    >

      <div class="folder-icon">
        <i class="fa-regular fa-folder"></i>
      </div>

      <h3>Rational Numbers</h3>

      <p>8 Notes</p>

      <span>1 week ago</span>

    </div>

    <div
      class="note-card"
      routerLink="/library-details/factorisation"
    >

      <div class="folder-icon">
        <i class="fa-regular fa-folder"></i>
      </div>

      <h3>Factorisation</h3>

      <p>15 Notes</p>

      <span>Yesterday</span>

    </div>

    <div
      class="note-card"
      routerLink="/library-details/simple-algebra"
    >

      <div class="folder-icon">
        <i class="fa-regular fa-folder"></i>
      </div>

      <h3>Simple Algebra</h3>

      <p>10 Notes</p>

      <span>5 days ago</span>

    </div>

  </div>

</div>

<app-bottom-nav></app-bottom-nav>
