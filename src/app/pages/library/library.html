<div class="library-page">

  <!-- TOP NAVBAR -->

  <div class="top-navbar">

    <i class="fa-solid fa-bars"></i>

    <h2>TASK TUTORIALS</h2>

    <img
      src="https://i.pravatar.cc/100"
      class="nav-profile"
    />

  </div>

  <!-- HEADER -->

  <div class="top-header">

    <div class="header-content">

      <h1>Smart E-notes</h1>

      <p>Access your comprehensive study material</p>

    </div>

    <div
      class="search-icon"
      (click)="toggleSearch()"
    >

      <i class="fa-solid fa-magnifying-glass"></i>

    </div>

    <!-- SEARCH -->

    <input
      *ngIf="showSearch"
      type="text"
      placeholder="Search notes..."
      [(ngModel)]="searchText"
      class="search-input"
    >

  </div>

  <!-- DROPDOWN -->

  <div class="dropdown-section">

    <select>

      <option>Xᵗʰ PCMB</option>

      <option>IXᵗʰ PCMB</option>

    </select>

  </div>

  <!-- NOTES GRID -->

  <div class="notes-grid">

    <div
      class="note-card"
      *ngFor="let note of filteredNotes"
      [routerLink]="note.route"
    >

      <div class="folder-icon">
        <i class="fa-regular fa-folder"></i>
      </div>

      <h3>{{ note.title }}</h3>

      <p>{{ note.notes }}</p>

      <span>{{ note.time }}</span>

    </div>

  </div>

</div>

<app-bottom-nav></app-bottom-nav>
