<app-sidebar
  [sidebarOpen]="sidebarOpen"
></app-sidebar>


<div
  class="library-page"

  (touchstart)="onTouchStart($event)"

  (touchend)="onTouchEnd($event)"
>

  <!-- TOP NAVBAR -->

  <!-- TOP NAVBAR -->

  <div class="top-navbar">

    <div class="menu-icon"
     (click)="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </div>

    <h2>TASK TUTORIALS</h2>

    <img
      src="https://i.pravatar.cc/100"
      class="nav-profile"
    />

  </div>

  <!-- HEADER -->

  <div class="top-header">

    <div class="header-content">

      <h1>Smart E-notes</h1>

      <p>

        Access your comprehensive study material 📚

      </p>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

      <i class="fa-solid fa-magnifying-glass"></i>

      <input
        type="text"
        placeholder="Search notes..."
        [(ngModel)]="searchText"
        class="search-input"
      />

    </div>

  </div>

  <!-- CATEGORY CHIPS -->

  <div class="chips-container">

    <div class="chip active-chip">

      All

    </div>

    <div class="chip">

      Top

    </div>

    <div class="chip">

      Recent

    </div>

    <div class="chip">

      Saved

    </div>

  </div>

  <!-- DROPDOWN -->

  <div class="dropdown-section">

    <select>

      <option>Xᵗʰ PCMB</option>

      <option>IXᵗʰ PCMB</option>

    </select>

  </div>

  <!-- NOTES GRID -->

  <div class="notes-grid">

    <div
      class="note-card"
      *ngFor="let note of filteredNotes"
      [routerLink]="note.route"
    >

      <!-- BADGE -->

      <div class="card-badge">

        {{ note.badge }}

      </div>

      <!-- THUMBNAIL -->

      <div class="thumbnail-section">

      </div>

      <!-- ICON -->

      <div class="folder-icon">

        <i class="fa-regular fa-folder"></i>

      </div>

      <!-- TITLE -->

      <h3>

        {{ note.title }}

      </h3>

      <!-- NOTES -->

      <p>

        {{ note.notes }}

      </p>

      <!-- PROGRESS -->

      <div class="progress-section">

        <div class="progress-text">

          Read {{ note.progress }}%

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            [style.width.%]="note.progress"
          ></div>

        </div>

      </div>

      <!-- TIME -->

      <span>

        {{ note.time }}

      </span>

    </div>

  </div>

</div>

<app-bottom-nav></app-bottom-nav>
