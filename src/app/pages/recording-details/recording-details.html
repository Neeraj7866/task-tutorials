<div class="details-page">

  <!-- TOP NAVBAR -->

  <div class="top-navbar">

    <i class="fa-solid fa-bars"></i>

    <h2>TASK TUTORIALS</h2>

    <img
      src="https://i.pravatar.cc/100"
      alt="profile"
    >

  </div>

  <!-- SEARCH -->

  <input
    *ngIf="showSearch"
    type="text"
    placeholder="Search lectures..."
    [(ngModel)]="searchText"
    class="search-input"
  />

  <!-- SUBJECT HEADER -->

  <div class="subject-navbar">

    <h1>

      {{ subject.replaceAll('-', ' ') }}

    </h1>

  </div>

  <!-- LECTURE LIST -->

  <div class="lecture-list">

    <!-- CARD 1 -->

    <div class="lecture-card">

      <div class="lecture-top">

        <div class="video-icon">
          <i class="fa-solid fa-video"></i>
        </div>

      </div>

      <h3>

        {{ subject.replaceAll('-', ' ') }} - Lecture 1

      </h3>

      <p class="duration">

        45 mins

      </p>

      <button class="watch-btn">

        ▶ Watch Recording

      </button>

    </div>

    <!-- CARD 2 -->

    <div class="lecture-card">

      <div class="lecture-top">

        <div class="video-icon">
          <i class="fa-solid fa-video"></i>
        </div>

      </div>

      <h3>

        {{ subject.replaceAll('-', ' ') }} - Lecture 2

      </h3>

      <p class="duration">

        38 mins

      </p>

      <button class="watch-btn">

        ▶ Watch Recording

      </button>

    </div>

    <!-- CARD 3 -->

    <div class="lecture-card">

      <div class="lecture-top">

        <div class="video-icon">
          <i class="fa-solid fa-video"></i>
        </div>

      </div>

      <h3>

        {{ subject.replaceAll('-', ' ') }} - Lecture 3

      </h3>

      <p class="duration">

        52 mins

      </p>

      <button class="watch-btn">

        ▶ Watch Recording

      </button>

    </div>

    <!-- CARD 4 -->

    <div class="lecture-card">

      <div class="lecture-top">

        <div class="video-icon">
          <i class="fa-solid fa-video"></i>
        </div>

      </div>

      <h3>

        {{ subject.replaceAll('-', ' ') }} - Lecture 4

      </h3>

      <p class="duration">

        41 mins

      </p>

      <button class="watch-btn">

        ▶ Watch Recording

      </button>

    </div>

  </div>

</div>
