<div
  class="live-page"

  (touchstart)="onTouchStart($event)"

  (touchend)="onTouchEnd($event)"
>

  <!-- TOP NAVBAR -->

  <div class="top-navbar">

    <div class="menu-icon">
      <i class="fa-solid fa-bars"></i>
    </div>

    <h2>TASK TUTORIALS</h2>

    <img
      src="https://i.pravatar.cc/100"
      class="nav-profile"
    />

  </div>

  <!-- LIVE HERO CARD -->

  <div class="live-card">

    <div class="live-status">

      <span class="dot"></span>

      <span>ACTIVE NOW</span>

    </div>

    <div class="live-header">

      <h1>X<sup>th</sup> PCMB</h1>

      <div class="mic-icon">
        <i class="fa-solid fa-microphone"></i>
      </div>

    </div>

    <div class="teacher-info">

      <img
        src="https://i.pravatar.cc/150"
        class="teacher-image"
      />

      <div>

        <h3>Mr. Ravi Sharma</h3>

        <p>Expert Physics & Math Tutor</p>

      </div>

    </div>

    <div class="live-details">

      <div class="detail-box">

        <i class="fa-regular fa-clock"></i>

        <span>12:00 - 13:00</span>

      </div>

      <div class="detail-box">

        <i class="fa-solid fa-book-open"></i>

        <span>L4 / 12</span>

      </div>

    </div>

    <button class="join-btn">

      <i class="fa-brands fa-youtube"></i>

      JOIN CLASSROOM

    </button>

  </div>

  <!-- UPCOMING -->

  <div class="upcoming-header">

    <h2>

      Upcoming Classes

    </h2>

    <button
      class="nearest-btn"
      (click)="sortNearest()"
    >

      Nearest

    </button>

  </div>

  <!-- SCROLL CARDS -->

  @if(upcomingClasses.length > 0){

  <div class="scroll-container">

    <div
      class="upcoming-card"

      *ngFor="let item of upcomingClasses"
    >

      <!-- TIME -->

      <div class="time-row">

        <span>

          {{ item.time }}

        </span>

        <i class="fa-solid fa-flask"></i>

      </div>

      <!-- TITLE -->

      <h3>

        {{ item.title }}

      </h3>

      <!-- TEACHER -->

      <div class="teacher-row">

        <img
          [src]="item.image"
        />

        <span>

          {{ item.teacher }}

        </span>

      </div>

      <!-- STATUS -->

      <div class="lesson-row">

        <span>

          TOPIC:
          {{ item.topic }}

        </span>

        <span class="starts-in">

          {{ getTimeLeft(item.time) }}

        </span>

      </div>

      <!-- BUTTON -->

      <button>

        Remind Me

      </button>

    </div>

  </div>

  }

  <!-- STATS -->

  <div class="stats-grid">

    <div class="stat-card">

      <div class="stat-icon red">

        <i class="fa-solid fa-location-dot"></i>

      </div>

      <div>

        <h2>12</h2>

        <p>DAY STREAK</p>

      </div>

    </div>

    <div class="stat-card">

      <div class="stat-icon green">

        <i class="fa-solid fa-shield"></i>

      </div>

      <div>

        <h2>85%</h2>

        <p>ACCURACY</p>

      </div>

    </div>

  </div>

</div>

<app-bottom-nav></app-bottom-nav>
